aid: dolby
name: Dolby
description: >-
  Dolby Laboratories is a leading technology company specializing in audio and
  video. The Dolby developer platform (dolby.io / Dolby OptiView) provides
  APIs and SDKs for media processing, real-time streaming, video playback, and
  ad delivery. Dolby is responsible for technologies including Dolby Atmos,
  Dolby Vision, and Dolby Digital.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
